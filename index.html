<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Exclusivo</title>
    <style>
        :root {
            --primary-glow: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --btn-glow: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --input-bg: #334155;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top right, rgba(0, 242, 254, 0.15), transparent 40%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .form-container {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            animation: glowPulse 4s infinite alternate;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 30px rgba(0, 242, 254, 0.15); }
            100% { box-shadow: 0 0 50px rgba(0, 242, 254, 0.35); }
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-glow);
        }

        h2 {
            color: var(--text-light);
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: var(--primary-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            color: var(--text-light);
            transition: all 0.25s ease;
        }

        input:focus {
            outline: none;
            border-color: #00f2fe;
            background-color: #1e293b;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.35);
        }

        button {
            width: 100%;
            background: var(--btn-glow);
            color: white;
            border: none;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.4;
            text-align: center;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(37, 211, 102, 0.5);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Registrate aquí</h2>
    <form id="leadForm">
        <div class="form-group">
            <label for="fullname">Nombre Completo</label>
            <input type="text" id="fullname" required autocomplete="name" placeholder="Juan Pérez">
        </div>
        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" required autocomplete="email" placeholder="ejemplo@correo.com">
        </div>
        <div class="form-group">
            <label for="phone">Teléfono (WhatsApp)</label>
            <input type="tel" id="phone" required autocomplete="tel" placeholder="Ej: 3815727447">
        </div>
        <button type="submit" id="submitBtn">
            <span>Registrate en 10 segundos y recibí la info por WhatsApp</span>
        </button>
    </form>
</div>

<script>
    const WHATSAPP_NUMBER = '5493815727447';

    document.getElementById('leadForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const fullname = document.getElementById('fullname').value.trim();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const phone = document.getElementById('phone').value.replace(/\D/g, '');

        // Formateo estricto del mensaje de texto para WhatsApp
        const textoMensaje = `¡Nuevo Registro Recibido!\n\n👤 *Nombre:* ${fullname}\n📧 *Email:* ${email}\n📱 *Teléfono:* ${phone}`;
        
        // Enlace directo nativo sin intermediarios de script externos
        const urlWhatsApp = `https://wa.me{WHATSAPP_NUMBER}?text=${encodeURIComponent(textoMensaje)}`;
        
        document.getElementById('leadForm').reset();
        
        // Redirección directa en la pestaña activa
        window.location.href = urlWhatsApp;
    });
</script>

</body>
            </html>
